name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, linux, x64]
    # Node.js 20 + npm are pre-installed on the self-hosted runner.
    steps:
      - uses: actions/checkout@v4

      - name: Checkout and build SDK (local dependency)
        run: |
          git clone --depth 1 https://github.com/remit-md/sdk.git ../sdk
          cd ../sdk/typescript
          npm install --legacy-peer-deps
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Test with coverage gate
        run: npm run test:coverage
