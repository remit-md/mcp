name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Checkout and build SDK (local dependency)
        run: |
          git clone --depth 1 https://github.com/remit-md/sdk.git ../sdk
          cd ../sdk/typescript
          npm install --legacy-peer-deps
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Test with coverage gate
        run: npm run test:coverage
