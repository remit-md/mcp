name: PR Hygiene

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  hygiene:
    uses: remit-md/.github/.github/workflows/pr-hygiene.yml@main
    with:
      preset: typescript
      scan_paths: src/
      test_dir: tests/
      check_any_type: true
