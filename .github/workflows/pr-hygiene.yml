name: PR Hygiene

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hygiene issues
        id: scan
        run: |
          REPORT=""
          ISSUES=0

          # --- Stub patterns ---
          STUBS=$(grep -rn 'TODO\|FIXME\|HACK\|XXX' --include='*.ts' src/ \
            | grep -v 'node_modules' || true)
          if [ -n "$STUBS" ]; then
            ISSUES=$((ISSUES + 1))
            REPORT="${REPORT}### TODO / FIXME / HACK comments found\n\`\`\`\n${STUBS}\n\`\`\`\n\n"
          fi

          # --- Test files with no assertions ---
          NO_ASSERT=""
          for f in $(find tests -name '*.ts' -not -name 'setup.ts' 2>/dev/null); do
            if ! grep -qE 'assert\.|strictEqual|deepEqual|throws|rejects|match|ok\(' "$f"; then
              NO_ASSERT="${NO_ASSERT}${f}\n"
            fi
          done
          if [ -n "$NO_ASSERT" ]; then
            ISSUES=$((ISSUES + 1))
            REPORT="${REPORT}### Test files with no assertions\n\`\`\`\n${NO_ASSERT}\`\`\`\n\n"
          fi

          # --- `any` type usage ---
          ANY_USAGE=$(grep -rn ': any\b\|as any\b' --include='*.ts' src/ \
            | grep -v 'node_modules' || true)
          if [ -n "$ANY_USAGE" ]; then
            ISSUES=$((ISSUES + 1))
            REPORT="${REPORT}### \`any\` type usage in production code\n\`\`\`\n${ANY_USAGE}\n\`\`\`\n\n"
          fi

          # --- Hardcoded addresses or keys ---
          HARDCODED=$(grep -rn '0x[0-9a-fA-F]\{40,\}' --include='*.ts' src/ \
            | grep -v 'node_modules\|test\|mock\|fixture\|DEFAULT_\|const.*USDC\|const.*ROUTER' || true)
          if [ -n "$HARDCODED" ]; then
            ISSUES=$((ISSUES + 1))
            REPORT="${REPORT}### Possible hardcoded addresses in production code\n\`\`\`\n${HARDCODED}\n\`\`\`\n\n"
          fi

          # --- Hardcoded secrets ---
          SECRETS=$(grep -rn 'PRIVATE_KEY\s*=\s*["'"'"'][^"'"'"']\+["'"'"']\|sk_live\|pk_live' --include='*.ts' src/ \
            | grep -v 'process\.env\|node_modules\|test' || true)
          if [ -n "$SECRETS" ]; then
            ISSUES=$((ISSUES + 1))
            REPORT="${REPORT}### Possible hardcoded secrets\n\`\`\`\n${SECRETS}\n\`\`\`\n\n"
          fi

          if [ "$ISSUES" -eq 0 ]; then
            echo "body=**PR Hygiene Check** :white_check_mark: â€” No issues found." >> "$GITHUB_OUTPUT"
          else
            {
              echo 'body<<HYGIENE_EOF'
              echo -e "**PR Hygiene Check** :warning: â€” Found ${ISSUES} category(s) of issues (advisory only)\n\n${REPORT}"
              echo 'HYGIENE_EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          HYGIENE_BODY: ${{ steps.scan.outputs.body }}
        with:
          script: |
            const body = process.env.HYGIENE_BODY;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('PR Hygiene Check')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
